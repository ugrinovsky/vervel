services:
  postgres:
    image: postgres:16
    ports:
      - '5432:5432'
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: ${DB_USER:-nazar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-vervel}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vervel_api
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
      - node_modules_api:/app/node_modules
    ports:
      - '3333:3333'
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      HOST: 0.0.0.0
      PORT: 3333
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: vervel_web
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  pgdata:
  node_modules_api:
