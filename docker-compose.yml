services:
  postgres:
    image: postgres:16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-nazar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-vervel}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vervel_api
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
      - node_modules_api:/app/node_modules
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: development
      DB_CONNECTION: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-nazar}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-vervel}
      HOST: 0.0.0.0
      PORT: 3333
      LIVEKIT_HOST: http://livekit:7880
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: vervel_web
    ports:
      - '5173:80'
    depends_on:
      - api

  livekit:
    image: livekit/livekit-server:latest
    container_name: vervel_livekit
    ports:
      - '7880:7880'
      - '7881:7881'
      # UDP range for prod — not needed locally (WebSocket fallback is used)
      # - '50000-60000:50000-60000/udp'
    volumes:
      - ./${LIVEKIT_CONFIG:-livekit.yaml}:/livekit.yaml
    command: --config /livekit.yaml

volumes:
  pgdata:
  node_modules_api:
