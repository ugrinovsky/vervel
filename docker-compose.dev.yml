services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: vervel_web_dev
    volumes:
      - ./apps/web:/app
      - node_modules_web:/app/node_modules
    ports:
      - '5174:5173'
    environment:
      NODE_ENV: development

volumes:
  node_modules_web:
