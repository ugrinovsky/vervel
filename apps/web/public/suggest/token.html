<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <script>
    var params = new URLSearchParams(window.location.hash.substring(1));
    var token = params.get('access_token');
    if (token) {
      var ch = new BroadcastChannel('ya_oauth');
      ch.postMessage({ ya_access_token: token });
      ch.close();
    }
    window.close();
  </script>
</head>
<body></body>
</html>
