<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Нет соединения — Vervel</title>
    <script src="/theme-init.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color_primary: rgb(14, 52, 72);
        --color_primary_dark: rgb(10, 38, 54);
        --color_primary_light: rgb(42, 168, 152);
        --color_bg_card: rgba(255,255,255,0.08);
        --color_border: rgba(255,255,255,0.12);
        --color_text_primary: rgba(255,255,255,1);
        --color_text_muted: rgba(255,255,255,0.55);
        --color_bg_screen: radial-gradient(circle at 50% 52.5%, rgb(14,52,72) 0%, rgb(10,38,54) 90%);
      }
      [data-theme="light"] {
        --color_primary: rgb(246,246,246);
        --color_primary_dark: rgb(236,236,236);
        --color_primary_light: rgb(75,120,175);
        --color_bg_card: rgb(255,255,255);
        --color_border: rgba(0,0,0,0.1);
        --color_text_primary: rgba(0,0,0,0.88);
        --color_text_muted: rgba(0,0,0,0.48);
        --color_bg_screen: rgb(244,243,241);
      }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--color_bg_screen);
        color: var(--color_text_primary);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      .card {
        background: var(--color_bg_card);
        border: 1px solid var(--color_border);
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
        max-width: 320px;
        width: calc(100% - 48px);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        opacity: 0.6;
        color: var(--color_primary_light);
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.3px;
      }

      p {
        font-size: 14px;
        color: var(--color_text_muted);
        line-height: 1.5;
        margin-bottom: 32px;
      }

      button {
        background: var(--color_primary_light);
        color: #fff;
        border: none;
        border-radius: 14px;
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { opacity: 0.75; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
      <h1>Нет подключения</h1>
      <p>Проверь Wi-Fi или мобильный интернет и попробуй снова.</p>
      <button onclick="location.reload()">Обновить</button>
    </div>
  </body>
</html>
